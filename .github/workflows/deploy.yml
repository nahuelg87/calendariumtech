name: Deploy Calendarium 🚀

on:
  push:
    branches: [ main ] # Se dispara al pushear a main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Astro 🏗️
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}

      # OPCIÓN A: Si usas GitHub Pages o similar
      # - name: Deploy to GitHub Pages
      #   uses: withastro/action@v2

      # OPCIÓN B: Si usas un VPS (vía SSH / FTP)
      # Aquí configurarías el rsync o el comando para subir los archivos a tu búnker