name: Deploy Calendarium Tech 🛰️

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código 📂
        uses: actions/checkout@v4

      - name: Instalación de Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalación de dependencias 🛠️
        run: npm install

      - name: Build del Búnker (Astro SSR) 🏗️
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}

      - name: Despliegue de archivos al VPS 🚀
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*,package.json,package-lock.json"
          target: "/var/www/html"
          rm: true # Esto limpia el index.nginx-debian.html y lo viejo

      - name: Levantar el Servidor Node (PM2) 🛰️
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/html
            npm install --production
            
            # Instalamos PM2 si no existe
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            # Reiniciamos el proceso para que cargue el logo nuevo y el SSR
            pm2 restart calendarium || pm2 start dist/server/entry.mjs --name calendarium
            
            # Aseguramos permisos y reiniciamos Nginx
            chown -R www-data:www-data /var/www/html
            systemctl restart nginx